# systemd-tmpfiles configuration for shakti's runtime directory.
# Install to /usr/lib/tmpfiles.d/shakti.conf.
#
# /var/run is tmpfs on every modern distro, so the sudo timestamp
# directory is gone on every boot. This snippet tells systemd-tmpfiles
# to recreate it with the correct ownership + mode before shakti runs.
#
# shakti's own _shk_ensure_ts_dir() will also create it lazily on
# first use, but having tmpfiles.d do it at boot is cleaner:
#   - Avoids a first-run race where two shakti invocations try to
#     mkdir the directory simultaneously.
#   - Lets administrators verify the directory exists with the right
#     perms before any auth happens.
#
# Format reference: man tmpfiles.d(5).
# Type  Path                   Mode  UID    GID    Age  Argument
d       /var/run/agnos/sudo    0700  root   root   -    -
