[graph]
all-features = true

[advisories]
version = 2
# `users` crate advisories are transitive via `pam` — we don't call group
# enumeration APIs, so these don't affect shakti. Track upstream fix:
# https://github.com/1wilkens/pam/issues
ignore = [
    "RUSTSEC-2025-0040", # users: root appended to group listings (transitive via pam)
    "RUSTSEC-2023-0040", # users: unmaintained (transitive via pam)
]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "GPL-3.0-only",
    "Unicode-3.0",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
